name: Deploy to Render

on:
  push:
    branches:
      - main
  workflow_run:
    workflows: ["MLOps Pipeline"]
    types:
      - completed

jobs:
  deploy:
    name: Notify Render Deployment
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log deployment trigger
        run: |
          echo "📤 Deployment triggered for Render"
          echo "🔗 Repository: ${{ github.repository }}"
          echo "📌 Branch: ${{ github.ref }}"
          echo "✅ Render will auto-deploy this push"
          echo ""
          echo "🚀 Check deployment status at:"
          echo "   https://dashboard.render.com"

      - name: Wait for deployment
        run: |
          echo "⏳ Render is building and deploying..."
          sleep 10
          echo "✅ Build initiated"

      - name: Deployment notification
        if: success()
        run: |
          echo "✅ Successfully triggered deployment to Render!"
          echo ""
          echo "📊 Status Dashboard:"
          echo "   https://dashboard.render.com/services/robotics-action-prediction"
          echo ""
          echo "🌐 Live Service:"
          echo "   https://robotics-action-prediction-system.onrender.com"
          echo ""
          echo "📖 API Documentation:"
          echo "   https://robotics-action-prediction-system.onrender.com/docs"
