global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'robotics-ai-monitor'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Robotics API metrics
  - job_name: 'robotics-api'
    static_configs:
      - targets: ['inference-api:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s
